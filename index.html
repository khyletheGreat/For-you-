<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Digital Love Letter</title>

<style>
  :root{
    --pink-1: #ffd6e8;
    --pink-2: #ff9ac0;
    --accent: #ff5c97;
    --paper: #fff7fb;
    --text: #6b1330;
  }

  html,body{
    height:100%;
    margin:0;
    font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background: radial-gradient(1200px 600px at 10% 10%, rgba(255,154,192,0.12), transparent),
                radial-gradient(900px 500px at 90% 90%, rgba(255,92,151,0.06), transparent),
                linear-gradient(180deg, #fff0f6 0%, #ffeef6 100%);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .stage{
    width: 360px;
    max-width:92%;
    perspective:1200px;
    text-align:center;
  }

  /* envelope */
  .envelope {
    width: 320px;
    height: 200px;
    margin: 0 auto;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 700ms cubic-bezier(.2,.9,.3,1);
    cursor: pointer;
  }

  .env-body {
    width:100%;
    height:100%;
    background: linear-gradient(180deg,var(--paper), #fff);
    border-radius:12px;
    border: 3px solid rgba(255,92,151,0.15);
    box-shadow: 0 20px 40px rgba(255,92,151,0.06), 0 6px 10px rgba(0,0,0,0.06);
    position: absolute;
    top:0; left:0;
    overflow: hidden;
    z-index: 1;
  }

  .env-flap {
    position:absolute;
    width:100%;
    height:60%;
    left:0;
    top:0;
    transform-origin: 50% 0%;
    background: linear-gradient(180deg,var(--accent), #ff7ab3);
    clip-path: polygon(0 0, 100% 0, 50% 70%);
    border-radius:12px;
    box-shadow: 0 10px 22px rgba(255,92,151,0.18);
    transform: rotateX(0deg);
    transition: transform 700ms cubic-bezier(.2,.9,.3,1);
    z-index: 3;
  }

  .env-seal {
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:48%;
    width:90px;
    height:90px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.18), transparent 20%),
                linear-gradient(180deg,#ff477f,#ff2e64);
    box-shadow: 0 6px 18px rgba(255,92,151,0.25), inset 0 -6px 12px rgba(0,0,0,0.06);
    z-index:4;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:700;
    font-size:28px;
  }

  .letter {
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    height:86%;
    top:8%;
    background: linear-gradient(180deg,#fff,#fffafc);
    border-radius:8px;
    padding:24px;
    box-sizing:border-box;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    transform: translateY(28px) scale(0.98);
    transition: transform 500ms cubic-bezier(.2,.9,.3,1), opacity 400ms;
    z-index:2;
    opacity:0;
  }

  .letter.opened {
    transform: translateY(-160px) scale(1);
    opacity:1;
  }

  .letter .title {
    font-weight:700;
    font-size:22px;
    color:var(--accent);
    margin-bottom:6px;
  }

  .letter .body {
    font-size:15px;
    line-height:1.5;
    color:#5b1630;
    min-height:84px;
    white-space:pre-wrap;
    margin-top:6px;
    overflow:hidden;
  }

  /* hearts/confetti */
  .hearts {
    pointer-events:none;
    position:absolute;
    inset:0;
    z-index:0;
  }

  .heart {
    position:absolute;
    width:18px;
    height:18px;
    transform-origin:center;
    opacity:0;
    will-change: transform, opacity;
  }
  .heart:before, .heart:after{
    content:"";
    position:absolute;
    width:12px;
    height:18px;
    background:var(--accent);
    border-radius:12px 12px 0 0;
    transform: rotate(-45deg);
    top:0;
    left:3px;
  }
  .heart:after{
    transform: rotate(45deg);
    left:-3px;
  }

  /* CTA hint */
  .hint {
    margin-top:20px;
    color:#a12b57;
    font-size:13px;
    opacity:0.9;
  }

  /* small sparkle */
  .sparkle {
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    background: rgba(255,255,255,0.8);
    filter: blur(6px);
    opacity:0;
  }

  /* responsive tweaks */
  @media (max-width:420px){
    .envelope{ width: 300px; height: 180px; }
  }

  /* keyframe helpers for hearts (JS will set durations) */
  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.9); opacity:1; }
    80% { opacity:1; }
    100% { transform: translateY(-240px) scale(1); opacity:0; }
  }

  /* typing caret */
  .body.typing::after{
    content: "";
    display:inline-block;
    width:8px;
    height:16px;
    background:var(--accent);
    margin-left:6px;
    animation: blink 1s steps(1) infinite;
    vertical-align:middle;
  }
  @keyframes blink{ 50% { opacity:0 } }
</style>
</head>
<body>

<div class="stage">
  <div class="envelope" id="envelope" aria-label="Open love letter">
    <div class="env-body"></div>
    <div class="env-flap" id="flap"></div>
    <div class="env-seal">❤</div>

    <div class="letter" id="letter">
      <div class="title">Para sa'yo ❤</div>
      <div class="body" id="letterBody"></div>
    </div>
  </div>

  <div class="hint">Click the envelope to open ❤️ — music will play</div>
  <div class="hearts" id="hearts"></div>
</div>

<!-- Hidden YouTube player container (controlled by JS) -->
<div id="player" style="display:none;"></div>

<!-- YouTube Iframe API -->
<script>
  // === Customizable message (Taglish, short & sweet) ===
  const messageText = "Mahal kita. Lagi kitang iniisip at inaalagaan — salamat sa'yo. Ikaw ang dahilan ng ngiti ko, at lagi akong nandito para sa'yo. 💌";

  // === Envelope open state logic, UI & animations ===
  const envelope = document.getElementById('envelope');
  const flap = document.getElementById('flap');
  const letter = document.getElementById('letter');
  const letterBody = document.getElementById('letterBody');
  const heartsContainer = document.getElementById('hearts');

  let opened = false;
  let typingTimer = null;

  // Make multiple hearts/confetti; they'll be triggered after open
  function spawnHearts(count = 18){
    heartsContainer.innerHTML = '';
    for(let i=0;i<count;i++){
      const h = document.createElement('div');
      h.className='heart';
      const size = 12 + Math.random()*18;
      h.style.width = size + 'px';
      h.style.height = size + 'px';
      // position randomly across envelope area
      h.style.left = (10 + Math.random()*80) + '%';
      h.style.top = (30 + Math.random()*50) + '%';
      // color variations in pinks
      const r = 230 + Math.floor(Math.random()*25);
      const g = 60 + Math.floor(Math.random()*90);
      const b = 100 + Math.floor(Math.random()*80);
      h.style.background = `linear-gradient(180deg, rgba(${r},${g},${b},1), rgba(${r-20},${g-20},${b-20},0.9))`;

      // animation
      const dur = 2200 + Math.random()*1800;
      h.style.animation = `floatUp ${dur}ms ease-out ${Math.random()*400}ms forwards`;
      heartsContainer.appendChild(h);
    }
    // remove hearts after animation
    setTimeout(()=> heartsContainer.innerHTML = '', 5000);
  }

  // typing effect for the message
  function typeText(element, text, speed = 28){
    element.classList.add('typing');
    element.textContent = "";
    let i=0;
    clearInterval(typingTimer);
    typingTimer = setInterval(()=>{
      element.textContent += text[i] || "";
      i++;
      if(i >= text.length){
        clearInterval(typingTimer);
        element.classList.remove('typing');
      }
    }, speed);
  }

  // small sparkle effect (optional)
  function sparkleOnce() {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = (40 + Math.random()*20) + '%';
    s.style.top = (10 + Math.random()*20) + '%';
    document.querySelector('.stage').appendChild(s);
    s.style.opacity = 1;
    s.animate([{opacity:1, transform:'scale(1)'},{opacity:0, transform:'scale(1.8)'}], {duration:900, easing:'ease-out'});
    setTimeout(()=> s.remove(),900);
  }

  // open / close
  envelope.addEventListener('click', async function(){
    if(opened) return;
    opened = true;

    // animate flap open (3D flip)
    flap.style.transform = 'rotateX(-180deg)';
    flap.style.transition = 'transform 700ms cubic-bezier(.2,.9,.3,1)';

    // move seal slightly
    document.querySelector('.env-seal').style.transform = 'translateY(-18px)';

    // show & slide letter
    setTimeout(()=>{
      letter.classList.add('opened');
      // start typing after letter has moved
      setTimeout(()=> {
        typeText(letterBody, messageText, 30);
      }, 420);
    }, 300);

    // spawn hearts & sparkle
    setTimeout(()=> {
      spawnHearts(20);
      sparkleOnce();
    }, 500);

    // start music (YouTube player)
    try{ playSong(); }catch(e){ /* ignore */ }

    // small bounce effect of envelope
    envelope.style.transform = 'translateY(-6px) rotateX(0deg)';
    setTimeout(()=> envelope.style.transform = '', 700);
  });

  // === YouTube Player: create and control (plays when envelope clicked) ===
  // video id from your link: 'pyGU-UudvrM'
  let player;
  function onYouTubeIframeAPIReady(){
    player = new YT.Player('player', {
      height: '0',
      width: '0',
      videoId: 'pyGU-UudvrM',
      playerVars: {
        'playsinline':1,
        'autoplay':0,
        'controls':0,
        'rel':0,
        'modestbranding':1
      },
      events: {
        'onReady': (e) => { /* ready */ }
      }
    });
  }

  // load API script
  (function loadYT(){
    if(window.YT && window.YT.Player){ onYouTubeIframeAPIReady(); return; }
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    // the API will call onYouTubeIframeAPIReady when loaded
    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
  })();

  function playSong(){
    // try to play unmuted; browsers may block autoplay with audio until user interacts,
    // but clicking envelope counts as interaction and should allow playback.
    if(player && typeof player.playVideo === 'function'){
      try { player.playVideo(); } catch(e) {
        /* fallback: attempt unmuted after a tiny delay */
        setTimeout(()=> { try{ player.playVideo(); }catch(err){} }, 300);
      }
    }
  }

  // Accessibility: allow Enter key to open when focused
  envelope.tabIndex = 0;
  envelope.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){ envelope.click(); e.preventDefault(); }
  });

  // Prevent accidental image drag
  document.querySelectorAll('img, .env-seal').forEach(el => {
    el.draggable = false;
  });

  // small initial wiggle to invite click
  setTimeout(()=> {
    envelope.animate([
      { transform: 'translateY(0)' },
      { transform: 'translateY(-8px)' },
      { transform: 'translateY(0)' }
    ], { duration: 1200, easing: 'ease-in-out' });
  }, 600);

</script>
</body>
</html>
